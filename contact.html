  <style>
    :root {
      --bg: #f2ecdf;
      --surface: #101924;
      --surface-2: #162434;
      --text: #111111;
      --text-light: #f6f7fb;
      --accent: #c04e4e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 10%, #fff2 0, #fff0 28%),
        radial-gradient(circle at 86% 84%, #c04e4e22 0, #c04e4e00 36%),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(900px, 100%);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 18px 40px #0000001f;
      background: linear-gradient(140deg, var(--surface), var(--surface-2));
      color: var(--text-light);
    }

    .hero {
      padding: 48px 28px 34px;
      text-align: center;
    }

    .badge {
      display: inline-block;
      border: 1px solid #ffffff3f;
      border-radius: 999px;
      padding: 8px 14px;
      letter-spacing: 0.08em;
      font-size: 12px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4.8vw, 3.3rem);
      line-height: 1.06;
    }

    p {
      margin: 16px auto 0;
      max-width: 650px;
      color: #e5e7f3;
      font-size: clamp(1rem, 2.3vw, 1.2rem);
      line-height: 1.5;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 26px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
      border-radius: 999px;
      padding: 14px 22px;
      font-weight: 700;
      letter-spacing: 0.01em;
      transition: transform 160ms ease, opacity 160ms ease, background 160ms ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      opacity: 0.95;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-secondary {
      border: 1px solid #ffffff52;
      color: #fff;
    }

    .social {
      border-top: 1px solid #ffffff2e;
      padding: 22px 28px 28px;
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .icon-link {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: #fff;
      background: #ffffff18;
      border: 1px solid #ffffff35;
      transition: transform 160ms ease, background 160ms ease;
    }

    .icon-link:hover {
      transform: translateY(-2px);
      background: #ffffff2e;
    }

    .icon-link svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }

    @media (max-width: 560px) {
      .hero {
        padding: 36px 18px 28px;
      }

      .social {
        padding: 18px 18px 24px;
      }
    }
  </style>
</head>
