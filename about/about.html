  <style>
    #page-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      overflow: hidden;
      transition: opacity .5s ease, visibility .5s ease;
    }

    #page-loader.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader__wrap {
      position: relative;
      width: 0;
      height: 0;
      transform-style: preserve-3d;
      perspective: 1000px;
      animation: loader-rotate 5s infinite linear;
    }

    .loader__particle {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      opacity: 0;
      background-color: hsla(var(--hue), 100%, 50%, 1);
      animation: loader-orbit 14s infinite;
      animation-delay: calc(var(--index) * 0.01s);
      box-shadow: 0 0 6px hsla(var(--hue), 100%, 50%, .7);
    }

    .loader__label {
      position: fixed;
      left: 50%;
      bottom: 12vh;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, .6);
      font-family: "Poppins", sans-serif;
      font-size: .7rem;
      letter-spacing: .35em;
      text-transform: uppercase;
    }

    @keyframes loader-rotate {
      100% {
        transform: rotateY(360deg) rotateX(360deg);
      }
    }

    @keyframes loader-orbit {
      20% {
        opacity: 1;
      }

      30%,
      80% {
        transform: rotateZ(calc(var(--z) * -1deg)) rotateY(calc(var(--y) * 1deg)) translateX(100px) rotateZ(calc(var(--z) * 1deg));
        opacity: 1;
      }

      100% {
        transform: rotateZ(calc(var(--z) * -1deg)) rotateY(calc(var(--y) * 1deg)) translateX(300px) rotateZ(calc(var(--z) * 1deg));
        opacity: 0;
      }
    }
  </style>

  <script>
    (function () {
      var loader = document.getElementById('page-loader');
      var loaderWrap = document.getElementById('loaderWrap');
      var totalParticles = 300;
      var baseHue = 0;
      var hidden = false;

      function buildParticles() {
        if (!loaderWrap) {
          return;
        }

        var fragment = document.createDocumentFragment();

        for (var index = 1; index <= totalParticles; index++) {
          var particle = document.createElement('div');
          particle.className = 'loader__particle';
          particle.style.setProperty('--index', index);
          particle.style.setProperty('--z', Math.floor(Math.random() * 360));
          particle.style.setProperty('--y', Math.floor(Math.random() * 360));
          particle.style.setProperty('--hue', ((40 / totalParticles) * index) + baseHue);
          fragment.appendChild(particle);
        }

        loaderWrap.appendChild(fragment);
      }

      function hideLoader() {
        if (!loader || hidden) {
          return;
        }

        hidden = true;
        loader.classList.add('is-hidden');
        window.setTimeout(function () {
          if (loader && loader.parentNode) {
            loader.parentNode.removeChild(loader);
          }
        }, 600);
      }

      function waitForRender() {
        var render = document.getElementById('render');
        var started = Date.now();

        function checkRender() {
          var hasContent = render && (render.children.length > 0 || render.textContent.trim().length > 0);
          var timedOut = Date.now() - started > 5000;

          if (hasContent || timedOut) {
            hideLoader();
            return;
          }

          window.setTimeout(checkRender, 120);
        }

        checkRender();
      }

      buildParticles();
      window.addEventListener('load', waitForRender);
    }());
  </script>
